<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loading...</title>
<style>
  body{
    margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
    background:#0a0a0a; color:#00ff9c; font-family:monospace;
  }
  .box{ text-align:center; width:90%; max-width:420px; }
  .bar{
    width:100%; height:10px; background:#222; border-radius:10px; overflow:hidden; margin-top:16px;
  }
  .fill{
    height:100%; width:0%; background:#00ff9c; transition:width .2s linear;
  }
  .hint{
    position:fixed; top:8px; right:10px; font-size:11px; color:#777;
  }
  .hidden{ display:none; }
</style>
</head>
<body>

<div class="hint">just for fun 😉</div>

<div id="screen1" class="box">
  <h3>Initializing system...</h3>
  <p id="text">Connecting...</p>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div id="screen2" class="box hidden" style="color:#333;">
  <h2 style="color:#ff4d6d;">🎉 Kena prank! 🎉</h2>
  <p style="color:#555;">Santai ya 😆 cuma iseng doang.</p>
</div>

<script>
let progress = 0;
const fill = document.getElementById("fill");
const text = document.getElementById("text");

const steps = [
  "Connecting...",
  "Checking system...",
  "Loading modules...",
  "Almost done..."
];

let i = 0;

const interval = setInterval(()=>{
  progress += 2;
  fill.style.width = progress + "%";

  if(progress % 25 === 0 && i < steps.length){
    text.innerText = steps[i++];
  }

  if(progress >= 100){
    clearInterval(interval);
    setTimeout(()=>{
      document.getElementById("screen1").classList.add("hidden");
      document.getElementById("screen2").classList.remove("hidden");
      document.body.style.background = "#fff";
    }, 600);
  }
}, 80);
</script>

</body>
</html>
